<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Chatbot</title>

<style>
body {
    font-family: Arial;
}

/* Chat Button */
#chat-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #4CAF50;
    color: white;
    border: none;
    padding: 15px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
}

/* Chat Box */
#chat-box {
    position: fixed;
    bottom: 80px;
    right: 20px;
    width: 320px;
    height: 450px;
    background: white;
    border-radius: 10px;
    display: none;
    flex-direction: column;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
}

/* Header */
#chat-header {
    background: #4CAF50;
    color: white;
    padding: 10px;
    border-radius: 10px 10px 0 0;
}

/* Messages */
#chat-body {
    flex: 1;
    padding: 10px;
    overflow-y: auto;
}

/* Input */
#chat-input {
    display: flex;
}

#chat-input input {
    flex: 1;
    padding: 10px;
    border: none;
    border-top: 1px solid #ccc;
}

#chat-input button {
    padding: 10px;
    border: none;
    background: #4CAF50;
    color: white;
}

/* Message styles */
.bot {
    background: #eee;
    padding: 8px;
    margin: 5px;
    border-radius: 5px;
}

.user {
    background: #4CAF50;
    color: white;
    padding: 8px;
    margin: 5px;
    border-radius: 5px;
    text-align: right;
}

/* Buttons */
.option-btn {
    display: block;
    margin: 6px 0;
    padding: 8px;
    background: #2196F3;
    color: white;
    border: none;
    cursor: pointer;
    border-radius: 5px;
}
</style>
</head>

<body>

<button id="chat-btn">💬</button>

<div id="chat-box">
    <div id="chat-header">Timetable Assistant</div>
    <div id="chat-body"></div>

    <div id="chat-input">
        <input type="text" id="user-input" placeholder="Type...">
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<script>
const chatBtn = document.getElementById("chat-btn");
const chatBox = document.getElementById("chat-box");
const chatBody = document.getElementById("chat-body");

let mode = null; // tracks current flow

// Toggle chat
chatBtn.onclick = () => {
    chatBox.style.display = chatBox.style.display === "flex" ? "none" : "flex";

    if (chatBody.innerHTML === "") {
        botMessage("👋 Hello! How can I help you?");
        showOptions();
    }
};

// Bot message
function botMessage(text) {
    const msg = `<div class="bot">${text}</div>`;
    chatBody.innerHTML += msg;
    chatBody.scrollTop = chatBody.scrollHeight;
}

// User message
function userMessage(text) {
    const msg = `<div class="user">${text}</div>`;
    chatBody.innerHTML += msg;
}

// Initial options
function showOptions() {
    const options = `
        <button class="option-btn" onclick="selectOption('timetable')">📅 Get Timetable</button>
        <button class="option-btn" onclick="selectOption('general')">❓ General Queries</button>
    `;
    chatBody.innerHTML += options;
}

// Option selection
function selectOption(option) {
    if (option === "timetable") {
        botMessage("📅 Choose how you want to search:");

        const buttons = `
            <button class="option-btn" onclick="askFaculty()">👨‍🏫 By Faculty</button>
            <button class="option-btn" onclick="askCourse()">🎓 By Course</button>
        `;
        chatBody.innerHTML += buttons;
    } else {
        mode = "general";
        botMessage("❓ Ask any general question");
    }
}

// Ask faculty
function askFaculty() {
    mode = "faculty";
    botMessage("👨‍🏫 Enter faculty name (e.g. Dr. Harimurugan)");
}

// Ask course
function askCourse() {
    mode = "course";
    botMessage("🎓 Enter course (e.g. B.Sc-CHE-4)");
}

// Send message
function sendMessage() {
    const input = document.getElementById("user-input");
    const text = input.value.trim();

    if (!text) return;

    userMessage(text);
    input.value = "";

    // RULE-BASED HANDLING
    setTimeout(() => {
        if (mode === "faculty") {
            botMessage(`📅 Fetching timetable for faculty: <b>${text}</b>`);
        }
        else if (mode === "course") {
            botMessage(`📅 Fetching timetable for course: <b>${text}</b>`);
        }
        else if (mode === "general") {
            botMessage("🤖 General query received (backend needed)");
        }
        else {
            botMessage("⚠️ Please choose an option first.");
            showOptions();
        }
    }, 500);
}
</script>

</body>
</html>
